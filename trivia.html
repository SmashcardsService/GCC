	 <main>	
	<div id="streak"> 
		<h3> Streak: <strong>1</strong> </h3>
	</div>
 
    <!-- Hero Section (Main Banner) -->
	<div id="trivia">
		<div id="question">
			<h2> An error occurred </h2>
		</div>
		<div id="answers">
		
				<button type ="button" id="answer1"> Name 1</button>
	
		
				<button type ="button" id="answer2"> Name 2</button>
		
	
				<button type ="button" id="answer3"> Name 3</button>
		
		
				<button type ="button" id="answer4"> Name 4</button>
			
		</div>
		<div id="output">
			<h2> An error occurred </h2>
		</div>
	</div>
	
    <!-- About Smashcards (Brief Overview) -->

	    <section class="hero">
        <h2><a href="https://forms.gle/NMKaGEwz6WRRPtAa9">Click here to submit your own trivia!</a></h2>

	<script src="triviaData.js"></script>
	<script>
	let question = document.getElementById("question");
	let answer1 = document.getElementById("answer1");
	let answer2 = document.getElementById("answer2");
	let answer3 = document.getElementById("answer3");
	let answer4 = document.getElementById("answer4");
	let output = document.getElementById("output");
	let streakDisplay = document.querySelector("#streak strong");

	let streak = 0;

	// Function to load a random question
	function loadQuestion() {
		// Pick a random question
		let keys = Object.keys(trivia);
		let randomKey = keys[Math.floor(Math.random() * keys.length)];
		let correctAnswer = trivia[randomKey];

		// Pick 3 random wrong answers
		let allAnswers = Object.values(trivia).filter(a => a !== correctAnswer);
		allAnswers.sort(() => 0.5 - Math.random());
		let wrongAnswers = allAnswers.slice(0, 3);

		// Combine and shuffle answers
		let answersArray = [correctAnswer, ...wrongAnswers];
		answersArray.sort(() => 0.5 - Math.random());

		// Display question
		question.innerHTML = `<h2>${randomKey}</h2>`;
		output.innerHTML = "";

		// Assign answers to buttons
		[answer1, answer2, answer3, answer4].forEach((btn, idx) => {
			btn.innerText = answersArray[idx];
			btn.disabled = false; // enable buttons
			btn.style.backgroundColor = ""; // reset button color
			btn.onclick = () => checkAnswer(btn, correctAnswer); // set click handler
		});
	}

	// Function to check the answer
	function checkAnswer(button, correctAnswer) {
		if (button.innerText === correctAnswer) {
			output.innerHTML = `<h2>Correct!</h2>`;
			streak++;
			button.style.backgroundColor = "#4CAF50"; // green
		} else {
			output.innerHTML = `<h2>Incorrect! The correct answer was: ${correctAnswer}</h2>`;
			streak = 0;
			button.style.backgroundColor = "#F44336"; // red
		}

		// Update streak display
		streakDisplay.innerText = streak;

		// Disable all buttons
		[answer1, answer2, answer3, answer4].forEach(btn => btn.disabled = true);

		// Add Next Question button
		let nextBtn = document.createElement("button");
		nextBtn.innerText = "Next Question";
		nextBtn.style.marginTop = "15px";
		nextBtn.onclick = () => {
			nextBtn.remove(); // remove the button
			loadQuestion();   // load new question
		};
		output.appendChild(nextBtn);
	}

	// Load first question
	loadQuestion();
	</script>
</body>
</html>
